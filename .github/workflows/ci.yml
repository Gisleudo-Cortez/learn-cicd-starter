name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - addtests

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run test suite
        run: go test ./... -cover

      - name: Run gosec
        run: gosec ./...

  formating:
    name: Style
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Set up go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"
      - run: go fmt ./... && test -z "$(go fmt ./...)" || (echo "Run gofmt to fix formatting issues."; exit 1)
      - uses: dominikh/staticcheck-action@v1
        with:
          version: "latest"
