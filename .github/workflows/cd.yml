name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - name: setup goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest

      - name: Build App
        run: ./scripts/buildprod.sh

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_CREDENTIALS }}"

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and Push Docker Image to Artifact Registry
        run: gcloud builds submit --tag us-central1-docker.pkg.dev/focal-acronym-490512-q1/notely-ar-repo/notely:v1.0 .
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Setup migration
        run: ./scripts/migrateup.sh

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy notely \
            --image us-central1-docker.pkg.dev/focal-acronym-490512-q1/notely-ar-repo/notely:v1.0 \
            --region us-central1 \
            --allow-unauthenticated \
            --project focal-acronym-490512-q1 \
            --max-instances=4
